services:
    ####################################################################################################
    # PHP
    ####################################################################################################
    appciga:
        build:
            args:
                user: school-user
                uid: 1000
            context: .docker/php
        container_name: ciga
        restart: unless-stopped
        volumes:
            - .:/var/www:cached
        networks:
            - cigaformation
        deploy:
            resources:
                limits:
                    cpus: 0.2
                    memory: 80M
                # reservations:
                #     cpus: 0.0
                #     memory: 70M
    
    ####################################################################################################
    # Nginx
    ####################################################################################################
    proxyciga:
        image: nginx
        container_name: proxy-ciga
        restart: unless-stopped
        ports:
            - '8000:80'
        labels:
            - caddy=ciga-formation.com
            - caddy.reverse_proxy="{{upstreams 80}}"
        volumes:
            - .:/var/www
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - cigaformation
        links:
            - appciga
        deploy:
            resources:
                limits:
                    cpus: 0.1
                    memory: 6M

    ####################################################################################################
    # DATABASE (MySQL)
    ####################################################################################################
    dbciga:
        image: mysql:5.7
        restart: unless-stopped
        expose:
            - '3306'
        volumes:
            - ./.docker/mysql/dump/ciga.sql:/docker-entrypoint-initdb.d/ciga.sql
            - ./.docker/mysql/config:/etc/mysql/conf.d
            - ciga_db:/var/lib/mysql
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_ALLOW_EMPTY_PASSWORD: false
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        links:
            - appciga
        networks:
            - cigaformation
        deploy:
            resources:
                limits:
                    cpus: 0.1
                    memory: 256M
    
    adminer:
        image: adminer
        restart: always
        expose:
            - 8080
        networks:
            - cigaformation

volumes:
    ciga_db:

networks:
    cigaformation:
        name: cigaformation
        external: true
